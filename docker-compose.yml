version: '3.8'

services:
  app:
    image: php:8.2-fpm
    container_name: saas_app
    working_dir: /var/www/html
    volumes:
      - ./app:/var/www/html
    networks:
      - saas-network

  web:
    image: nginx:latest
    container_name: saas_web
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - saas-network

  db:
    image: mysql:8
    container_name: saas_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: saas_db
      MYSQL_USER: saas_user
      MYSQL_PASSWORD: saas_pass
    ports:
      - "3306:3306"
    networks:
      - saas-network

  redis:
    image: redis:latest
    container_name: saas_redis
    ports:
      - "6379:6379"
    networks:
      - saas-network

networks:
  saas-network:
    driver: bridge